<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PizzaHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <div class="menu-container">
        <h1 id="page-title"></h1>
        <div class="hamburger" id="hamburger">☰</div>
    </div>
    <div id="menu"></div>
</header>

<main>
<section class="pizza-calculator">

    <h2>Pizza Calculator</h2>

    <div class="calc-form">

        <label for="aantal">Aantal pizza's</label>
        <input type="number" id="aantal" min="1" max="999" placeholder="bv. 1">

        <label for="vorm">Vorm pizza</label>
        <select id="vorm">
            <option value="">-- Kies een vorm --</option>
            <option value="rond">Rond</option>
            <option value="rechthoek">Rechthoekig</option>
            <option value="driehoek">Driehoekig</option>
        </select>

        <!-- ROND -->
        <div id="veld-rond" class="vorm-veld" style="display:none;">
            <label for="diameter">Diameter (cm)</label>
            <input type="number" id="diameter" min="1" max="999" placeholder="bv. 30">
        </div>

        <!-- RECHTHOEK -->
        <div id="veld-rechthoek" class="vorm-veld" style="display:none;">
            <label for="lengte">Lengte (cm)</label>
            <input type="number" id="lengte" min="1" max="999" placeholder="bv. 30">

            <label for="breedte">Breedte (cm)</label>
            <input type="number" id="breedte" min="1" max="999" placeholder="bv. 20">
        </div>

        <!-- DRIEHOEK -->
        <div id="veld-driehoek" class="vorm-veld" style="display:none;">
            <label for="basis">Basis (cm)</label>
            <input type="number" id="basis" min="1" max="999" placeholder="bv. 25">

            <label for="hoogte">Hoogte (cm)</label>
            <input type="number" id="hoogte" min="1" max="999" placeholder="bv. 20">
        </div>

        <div id="foutmelding" style="display:none; color:red; font-weight:bold; margin-top:10px;"></div>

        <button onclick="berekenPizza()">Bereken pizza</button>


        <button id="clearBtn" type="button" class="btn-primary btn-wis">Wis</button>

    </div>

    <div id="ingredienten" class="pizza-ingredienten">
        <h3>Ingrediënten voor je pizza</h3>
        <ul></ul>
    </div>

</section>
</main>

<div id="footer"></div>

<script src="js/menu.js"></script>
<script src="js/title.js"></script>
<script src="js/footer.js"></script>
<script src="js/calculator.js"></script>

</body>
</html>
