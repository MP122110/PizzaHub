<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PizzaHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <div class="menu-container">
        <h1 id="page-title"></h1>
        <div class="hamburger" id="hamburger">☰</div>
    </div>
    <div id="menu"></div>
</header>

<main>
    <section>
        <h2>Pizza Calculator</h2>

            <label>Aantal pizza's</label>
            <input type="number" id="aantal" min="1">

            <label>Diameter pizza (cm)</label>
            <input type="number" id="diameter" min="1">

            <button onclick="bereken()">Bereken</button>

            <div id="resultaten" class="resultaten"></div>

    </section>
</main>

<div id="footer"></div>

<script src="js/menu.js"></script>
<script src="js/title.js"></script>
<script src="js/footer.js"></script>
<script src="js/calculator.js"></script>

</body>
</html>
